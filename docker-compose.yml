services:
  postgres:
    image: postgres:16
    container_name: moneymanagement-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finanzesvc
      POSTGRES_PASSWORD: finanzesvc
      POSTGRES_DB: finanze
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanzesvc -d finanze"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
