{% extends "base.html" %}
{% block title %}Modifica Transazione - Finanze{% endblock %}
{% block content %}
<div class="section-title"><i class="bi bi-pencil-fill me-2"></i>Modifica Transazione</div>

<div class="row">
<div class="col-md-8 col-lg-6">
<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Profilo</label>
                    <div class="d-flex gap-3">
                        {% for p in profiles %}
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="profile" id="profile_{{ p }}" value="{{ p }}" {% if tx.profile == p %}checked{% endif %} required>
                            <label class="form-check-label" for="profile_{{ p }}">
                                <span class="badge {% if p == 'Anna' %}badge-anna{% else %}badge-fede{% endif %}">{{ p }}</span>
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Tipo</label>
                    <div class="d-flex gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="type" id="type_expense" value="Expense" {% if tx.type == 'Expense' %}checked{% endif %} required>
                            <label class="form-check-label" for="type_expense"><span class="badge bg-danger">Spesa</span></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="type" id="type_income" value="Income" {% if tx.type == 'Income' %}checked{% endif %} required>
                            <label class="form-check-label" for="type_income"><span class="badge bg-primary">Entrata</span></label>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Data</label>
                    <input type="date" class="form-control" name="date" value="{{ tx.date.strftime('%Y-%m-%d') if tx.date else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Categoria</label>
                    <select class="form-select" id="category" name="category" required>
                        {% for type_key, cat_list in categories.items() %}
                        <optgroup label="{{ type_key }}">
                            {% for c in cat_list %}
                            <option value="{{ c }}" {% if tx.category == c %}selected{% endif %}>{{ c }}</option>
                            {% endfor %}
                        </optgroup>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Sottocategoria</label>
                    <select class="form-select" id="subcategory" name="subcategory">
                        <option value="{{ tx.subcategory or '' }}">{{ tx.subcategory or 'Nessuna' }}</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Importo</label>
                    <div class="input-group">
                        <span class="input-group-text">€</span>
                        <input type="number" class="form-control" name="amount" step="0.01" min="0" value="{{ tx.amount }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Valuta</label>
                    <select class="form-select" name="currency">
                        <option value="EUR" {% if tx.currency == 'EUR' %}selected{% endif %}>EUR</option>
                        <option value="USD" {% if tx.currency == 'USD' %}selected{% endif %}>USD</option>
                        <option value="GBP" {% if tx.currency == 'GBP' %}selected{% endif %}>GBP</option>
                        <option value="CHF" {% if tx.currency == 'CHF' %}selected{% endif %}>CHF</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Importo in EUR</label>
                    <div class="input-group">
                        <span class="input-group-text">€</span>
                        <input type="number" class="form-control" name="amount_eur" step="0.01" min="0" value="{{ tx.amount_eur }}">
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Note</label>
                    <textarea class="form-control" name="notes" rows="2">{{ tx.notes or '' }}</textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check-circle me-1"></i>Aggiorna
                </button>
                <a href="{{ url_for('transactions') }}" class="btn btn-outline-secondary px-4">
                    <i class="bi bi-x-circle me-1"></i>Annulla
                </a>
            </div>
        </form>
    </div>
</div>
</div>
</div>

<script>
const subcategories = {{ subcategories | tojson }};
document.getElementById('category').addEventListener('change', function() {
    updateSubcategories(this.value, '');
});
function updateSubcategories(category, selected) {
    const sel = document.getElementById('subcategory');
    sel.innerHTML = '<option value="">Nessuna</option>';
    const subs = subcategories[category] || [];
    subs.forEach(s => {
        if (s !== '') {
            const opt = document.createElement('option');
            opt.value = s; opt.textContent = s;
            if (s === selected) opt.selected = true;
            sel.appendChild(opt);
        }
    });
}
window.addEventListener('load', () => updateSubcategories('{{ tx.category }}', '{{ tx.subcategory or "" }}'));
</script>
{% endblock %}
